<div id="je-loading">Loading…</div>
<div data-role="content">
  <div class="content-primary je-discover-page">
    <div id="je-discover-container"></div>
  </div>
</div>
<div id="je-error" style="display:none">
  Jellyfin Enhanced not ready.
</div>
<script>
(function () {
  var MAX_WAIT = 5000;
  var INTERVAL = 50;
  var waited = 0;

  var loadingEl = document.getElementById("je-loading");
  var errorEl = document.getElementById("je-error");
  var JE = window.JellyfinEnhanced;

  var timer = setInterval(function () {
    if (JE && JE.discoverPage) {
      clearInterval(timer);
      loadingEl.remove();
      JE.discoverPage.injectStyles();
      JE.discoverPage.renderPage();
      JE.discoverPage._pluginPageVisible = true;
      return;
    }

    waited += INTERVAL;
    if (waited >= MAX_WAIT) {
      clearInterval(timer);
      loadingEl.style.display = "none";
      errorEl.style.display = "block";
    }
  }, INTERVAL);
})();

window.addEventListener('beforeunload', function () {
  var JE = window.JellyfinEnhanced;
  if (JE && JE.discoverPage) {
    JE.discoverPage._pluginPageVisible = false;
  }
});
</script>
